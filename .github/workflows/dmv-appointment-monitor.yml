name: DMV appointment monitor

on:
  schedule:
    # GitHub's shortest supported interval is five minutes. Starting at minute
    # 3 avoids the busiest queue time at the top of each hour.
    - cron: "3/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: dmv-appointment-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Bay Area drive-test dates
        uses: actions/github-script@v7
        env:
          DEADLINE: "2026-07-31"
        with:
          script: |
            const offices = {
              "Santa Clara": "632!afa980930a4d9da9dea767520801e38ef924a286d22bf6d97782c5d20731",
              "San Jose": "516!56b48e272ba45819d81868f440fb30eb6c406b705436cf1d101d2ea2c75c",
              "Fremont": "644!03ada32357f5fd32a107fca81b020fd9b4fd0062cbaabf014dcacb6b5516",
              "Los Gatos": "640!9ffc1fef9b57f8bf1ba6984ffdb4981acbf88d4b101ae27edac9d65a45f4",
              "Redwood City": "548!c6a4228d96cbe545c591e4257d1c035da72cbe10671d502597460e5f0730",
              "San Mateo": "593!fabfb52efab03764853fcdefa999d2a0be739510bec5207f4b82d5fb16e0"
            };
            const service = "DT!1857a62125c4425a24d85aceac6726cb8df3687d47b03b692e27bd8d17814";
            const bookingUrl = "https://www.dmv.ca.gov/portal/appointments/select-appointment-type/";
            const deadline = process.env.DEADLINE;
            const today = new Date().toISOString().slice(0, 10);

            if (today > deadline) {
              core.info(`Deadline ${deadline} has passed; nothing to check.`);
              return;
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });

            let successfulChecks = 0;
            for (const [office, branchCode] of Object.entries(offices)) {
              const url = new URL(
                `https://www.dmv.ca.gov/portal/wp-json/dmv/v1/appointment/branches/${encodeURIComponent(branchCode)}/dates`
              );
              url.searchParams.append("services[]", service);
              url.searchParams.set("numberOfCustomers", "1");

              try {
                const response = await fetch(url, {
                  headers: { "User-Agent": "ca-dmv-appointment-monitor/1.0" }
                });
                if (!response.ok) {
                  core.warning(`${office}: DMV returned HTTP ${response.status}`);
                  continue;
                }

                const rawDates = await response.json();
                if (!Array.isArray(rawDates)) {
                  core.warning(`${office}: unexpected DMV response`);
                  continue;
                }
                successfulChecks += 1;

                const dates = [...new Set(rawDates.map(value => String(value).slice(0, 10)))].sort();
                const matches = dates.filter(value => value >= today && value <= deadline);
                core.info(`${office}: earliest=${dates[0] || "none"}; qualifying=${matches.length}`);
                if (matches.length === 0) continue;

                const title = `DMV opening: ${office} — ${matches[0]}`;
                if (existing.some(issue => issue.title === title)) {
                  core.info(`Already alerted: ${title}`);
                  continue;
                }

                const dateList = matches.map(value => `- ${value}`).join("\n");
                const body = [
                  `A behind-the-wheel drive-test date on or before **${deadline}** was found.`,
                  "",
                  `**Office:** ${office}`,
                  "",
                  "**Available dates reported by the DMV API:**",
                  dateList,
                  "",
                  `[Book on the official California DMV site](${bookingUrl})`,
                  "",
                  "Availability can disappear quickly, and the DMV may occasionally show a ghost appointment. This monitor does not book appointments."
                ].join("\n");

                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  assignees: [context.repo.owner]
                });
                core.notice(`Created alert: ${title}`);
              } catch (error) {
                core.warning(`${office}: check failed: ${error.message}`);
              }
            }

            if (successfulChecks === 0) {
              core.setFailed("Every DMV office check failed.");
            }
