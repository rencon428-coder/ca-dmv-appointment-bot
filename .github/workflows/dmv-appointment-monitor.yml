name: DMV appointment monitor

on:
  schedule:
    # Check the public DMV Filter results every five minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: dmv-appointment-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Bay Area drive-test dates
        uses: actions/github-script@v9
        env:
          DEADLINE: "2026-07-31"
          RESULTS_URL: "https://www.dmvfilter.com/?sort=appt%3Aasc&appt=DT&zip=95054&dist=30"
        with:
          retries: 2
          script: |
            const deadline = process.env.DEADLINE;
            const resultsUrl = process.env.RESULTS_URL;
            const bookingUrl = "https://www.dmv.ca.gov/portal/appointments/select-appointment-type/";
            const today = new Date().toISOString().slice(0, 10);

            if (today > deadline) {
              core.info(`Deadline ${deadline} has passed; nothing to check.`);
              return;
            }

            const response = await fetch(resultsUrl, {
              headers: { "User-Agent": "ca-dmv-appointment-monitor/2.0" }
            });
            if (!response.ok) {
              core.setFailed(`DMV Filter returned HTTP ${response.status}`);
              return;
            }
            const html = await response.text();

            // DMV Filter is a Next.js site. Decode its public page-data chunks,
            // then read the drive-test date list for each filtered office.
            let pageData = "";
            for (const match of html.matchAll(/self\.__next_f\.push\((.*?)\)<\/script>/gs)) {
              try {
                const chunk = JSON.parse(match[1]);
                if (typeof chunk[1] === "string") pageData += `${chunk[1]}\n`;
              } catch (error) {
                core.debug(`Skipped an unreadable page-data chunk: ${error.message}`);
              }
            }

            const officePattern = /"id":\d+,"name":"([^"]+)"[\s\S]*?,"appts":\{"DL":\[[^\]]*\],"DT":\[([^\]]*)\]\}/g;
            const candidates = [];
            for (const match of pageData.matchAll(officePattern)) {
              const office = match[1];
              const dates = [...match[2].matchAll(/"(\d{4}-\d{2}-\d{2})"/g)]
                .map(item => item[1])
                .filter(value => value >= today && value <= deadline)
                .sort();
              core.info(`${office}: qualifying=${dates.length}`);
              if (dates.length > 0) candidates.push({ office, dates });
            }

            if (pageData.length === 0 || !pageData.includes('"total":8')) {
              core.setFailed("Could not parse the expected eight DMV Filter results.");
              return;
            }
            if (candidates.length === 0) {
              core.info(`No dates on or before ${deadline}.`);
              return;
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });

            for (const { office, dates } of candidates) {
              const title = `DMV opening: ${office} — ${dates[0]}`;
              if (existing.some(issue => issue.title === title)) {
                core.info(`Already alerted: ${title}`);
                continue;
              }

              const body = [
                `A behind-the-wheel drive-test date on or before **${deadline}** was found.`,
                "",
                `**Office:** ${office}`,
                "",
                "**Available dates reported by DMV Filter:**",
                ...dates.map(value => `- ${value}`),
                "",
                `[Open the filtered results](${resultsUrl})`,
                `[Book on the official California DMV site](${bookingUrl})`,
                "",
                "Availability can disappear quickly. This monitor only reports public DMV Filter results and does not book appointments."
              ].join("\n");

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                assignees: [context.repo.owner]
              });
              core.notice(`Created alert: ${title}`);
            }
